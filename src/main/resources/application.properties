# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=${SHOPFLOW_DB_URL:jdbc:mysql://localhost:3306/shopflow_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SHOPFLOW_DB_USER:root}
spring.datasource.password=${SHOPFLOW_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
# For local testing only; use env var in real deployment
shopflow.jwt.secret=${SHOPFLOW_JWT_SECRET:3f8b2c1a9e4d7f6b0a5c8e2d1f4a7b9c3e6d8f1a2b5c7e0d4f6a8b1c3e5d7f9}
shopflow.jwt.expiry-ms=86400000

# ── Stripe ────────────────────────────────────────────────────────────────────
# Use Stripe test mode keys via env vars
shopflow.stripe.secret-key=${SHOPFLOW_STRIPE_SECRET_KEY:}
shopflow.stripe.webhook-secret=${SHOPFLOW_STRIPE_WEBHOOK_SECRET:}
shopflow.stripe.currency=${SHOPFLOW_STRIPE_CURRENCY:inr}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.security=WARN
